# Snippet Notebook — coturn (WebRTC relay only, no notebook storage)
listening-port=3478
fingerprint
lt-cred-mech
user=snippet:change-me
realm=snippet-notebook

no-multicast-peers
no-cli
no-tls
no-dtls

log-file=stdout
simple-log

# Small relay range — map each UDP port on your Unikraft UDP service (see create-udp-service.sh).
min-port=49160
max-port=49170

# Added at runtime by docker-entrypoint-unikraft.sh (TURN_EXTERNAL_IP).
